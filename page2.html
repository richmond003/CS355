<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./style.css">
    <title>Page 2</title>
</head>
<body>
    <div id="page2-container">
        <div id="cover-img">
            <img id="show-cover" src="placeholder.jpg" alt="show cover image">
        </div>

        <div id="show-details">
            <h1 id="show-title">Show Title Name</h1>

            <div>
                <div id="tags-group">
                    <div class="tags">
                        <i class="bi bi-film"></i>
                        <span id="show-type">Type</span>
                    </div>

                    <div class="tags">
                        <i class="bi bi-translate"></i>
                        <span id="show-language">Language</span>
                    </div>

                    <div class="tags">
                        <i class="bi bi-calendar-heart-fill"></i>
                        <span id="date">Date premiered</span>
                    </div>
                </div>
            </div>
            <div id="show-summary">
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Vero repellat harum quisquam maiores illum, officia magni praesentium excepturi, facilis sit similique? Minus dicta quidem, doloremque tempora maiores accusamus! Adipisci, error.</p>
            </div>
        </div>
        <toggle>LIGHT</toggle>
    </div>

</body>
<script src="./script.js"></script>
</html>
